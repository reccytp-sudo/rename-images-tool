<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批次圖片重新命名與統計工具</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-color: #4A90E2;
            --primary-hover: #357ABD;
            --success-color: #27AE60;
            --success-hover: #219653;
            --danger-color: #E74C3C;
            --danger-hover: #C0392B;
            --bg-color: #F5F7FA;
            --text-color: #333333;
            --border-color: #E4E7EB;
            --warning-color: #F2994A;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: var(--primary-color);
        }

        .drop-zone {
            border: 2px dashed var(--primary-color);
            border-radius: 8px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f9fcff;
            margin-bottom: 2rem;
        }

        .drop-zone.dragover {
            background-color: #e6f2ff;
            border-color: var(--primary-hover);
            transform: scale(1.02);
        }

        .drop-zone p {
            margin: 0;
            font-size: 1.1rem;
            color: #555;
        }

        .drop-zone span {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #888;
        }

        #file-input {
            display: none;
        }

        .table-container {
            display: none;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        .status-label { color: var(--success-color); font-weight: 500; }
        .status-warning { color: var(--warning-color); font-weight: 500; }

        .actions {
            display: none;
            margin-top: 1.5rem;
            text-align: right;
            gap: 10px;
            display: flex;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        button {
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }

        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-excel { background-color: var(--success-color); }
        .btn-excel:hover { background-color: var(--success-hover); }
        
        .btn-reset { background-color: var(--danger-color); }
        .btn-reset:hover { background-color: var(--danger-hover); }

        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>批次圖片重新命名與統計工具</h1>
        
        <div class="drop-zone" id="drop-zone">
            <p>點擊此處選擇圖片，或將圖片拖曳至此</p>
            <span>（支援 .jpg, .png 等常見格式）</span>
            <input type="file" id="file-input" multiple accept="image/*">
        </div>

        <div class="table-container" id="table-container">
            <table id="preview-table">
                <thead>
                    <tr>
                        <th>原始檔名</th>
                        <th>新檔名</th>
                        <th>狀態預覽</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div class="actions" id="actions-container" style="display: none;">
            <button id="reset-btn" class="btn-reset">🗑️ 重設清空</button>
            <button id="download-excel-btn" class="btn-excel">📊 下載統計 Excel</button>
            <button id="download-zip-btn" class="btn-primary">📦 確認並打包 ZIP</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const tableContainer = document.getElementById('table-container');
        const tbody = document.querySelector('#preview-table tbody');
        const actionsContainer = document.getElementById('actions-container');
        
        const downloadZipBtn = document.getElementById('download-zip-btn');
        const downloadExcelBtn = document.getElementById('download-excel-btn');
        const resetBtn = document.getElementById('reset-btn');

        let processedFiles = []; // 儲存處理過後的檔案物件
        let statsData = {};      // 儲存每個地點的圖片數量

        // 點擊與拖曳事件
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) processFiles(Array.from(e.dataTransfer.files));
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processFiles(Array.from(e.target.files));
        });

        // 核心處理與統計邏輯
        function processFiles(files) {
            // 排序
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

            processedFiles = [];
            statsData = {}; // 重置統計資料
            let currentLabel = "";
            let currentCounter = 0;

            tbody.innerHTML = ''; // 清空表格

            files.forEach(file => {
                const originalName = file.name;
                let newName = "";
                let statusHtml = "";
                
                const lastDotIndex = originalName.lastIndexOf(".");
                const ext = lastDotIndex !== -1 ? originalName.slice(lastDotIndex) : "";
                
                // 辨識「標籤圖」的 Regex
                const labelRegex = /_([^_]+?)\(1\)(?=\.[^.]+$)/i;
                const match = originalName.match(labelRegex);

                if (match) {
                    currentLabel = match[1]; // 例如: 巴士站(5)
                    currentCounter = 1;
                    newName = `${currentLabel}(${currentCounter})${ext}`;
                    statusHtml = `<span class="status-label">✅ 標籤圖更新: ${currentLabel}</span>`;
                } else {
                    if (currentLabel !== "") {
                        currentCounter++;
                        newName = `${currentLabel}(${currentCounter})${ext}`;
                        statusHtml = `<span class="status-label">✓ 自動遞增</span>`;
                    } else {
                        newName = originalName;
                        statusHtml = `<span class="status-warning">⚠️ 無所屬標籤，保持原名</span>`;
                    }
                }

                // 統計數量紀錄
                if (currentLabel !== "") {
                    statsData[currentLabel] = (statsData[currentLabel] || 0) + 1;
                }

                processedFiles.push({ file, newName });

                // 渲染至網頁表格
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${originalName}</td>
                    <td><strong>${newName}</strong></td>
                    <td>${statusHtml}</td>
                `;
                tbody.appendChild(tr);
            });

            tableContainer.style.display = 'block';
            actionsContainer.style.display = 'flex';
        }

        // --- 功能 1：重設清空 ---
        resetBtn.addEventListener('click', () => {
            // 清空陣列與物件
            processedFiles = [];
            statsData = {};
            
            // 清空 UI
            tbody.innerHTML = '';
            tableContainer.style.display = 'none';
            actionsContainer.style.display = 'none';
            
            // 清空 file input 的值，這樣重複上傳相同檔案才會觸發 change 事件
            fileInput.value = '';
        });

        // --- 功能 2：下載 Excel 統計表 ---
        downloadExcelBtn.addEventListener('click', () => {
            if (Object.keys(statsData).length === 0) {
                alert("目前沒有統計資料！");
                return;
            }

            // 準備寫入 Excel 的資料陣列
            const excelData = [];
            let totalImages = 0;

            // 整理每一列的資料
            for (const [place, count] of Object.entries(statsData)) {
                excelData.push({
                    "Place": place,
                    "Fire Damper": count  // 若需更改欄位名稱，修改引號內的文字即可
                });
                totalImages += count;
            }

            // 加入空白行與 Total 總計行 (依照你提供的圖片格式)
            excelData.push({ "Place": "", "Fire Damper": "" });
            excelData.push({
                "Place": "Total",
                "Fire Damper": totalImages
            });

            // 使用 SheetJS 產生 Excel
            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Summary"); // 工作表名稱

            // 下載檔案
            XLSX.writeFile(workbook, "Summary_Report.xlsx");
        });

        // --- 功能 3：打包下載 ZIP (維持原樣) ---
        downloadZipBtn.addEventListener('click', async () => {
            if (processedFiles.length === 0) return;

            const originalText = downloadZipBtn.innerText;
            downloadZipBtn.innerText = "打包中，請稍候...";
            downloadZipBtn.disabled = true;

            try {
                const zip = new JSZip();
                processedFiles.forEach(item => {
                    zip.file(item.newName, item.file);
                });
                const content = await zip.generateAsync({ type: "blob" });
                
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Renamed_Images.zip";
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error("ZIP 打包失敗:", error);
                alert("打包過程發生錯誤，請查看 Console。");
            } finally {
                downloadZipBtn.innerText = originalText;
                downloadZipBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
